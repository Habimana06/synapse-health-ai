services:
  mysql:
    image: mysql:8.0
    container_name: synapse-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "62001"
      MYSQL_DATABASE: synapse_health_ai
      MYSQL_USER: synapse
      MYSQL_PASSWORD: "62001"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - ./database/migrations/003_user_permissions.sql:/docker-entrypoint-initdb.d/03-user_permissions.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p62001"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: synapse-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: synapse
      DB_PASSWORD: "62001"
      DB_NAME: synapse_health_ai
      CLIENT_URL: http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: synapse-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
